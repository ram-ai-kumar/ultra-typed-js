<!DOCTYPE html>
<html>
<head>
  <title>UltraTyped Benchmarks</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 50px auto; padding: 20px; }
    h1 { color: #333; }
    .metric { background: #f5f5f5; padding: 20px; margin: 10px 0; border-radius: 8px; }
    .metric-label { font-size: 14px; color: #666; }
    .metric-value { font-size: 32px; font-weight: bold; color: #2563eb; }
    #out { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>UltraTyped Benchmarks</h1>
  <div class="metric">
    <div class="metric-label">FPS</div>
    <div class="metric-value" id="fps">-</div>
  </div>
  <div class="metric">
    <div class="metric-label">Last Updated</div>
    <div class="metric-value" id="timestamp">-</div>
  </div>
  <script>
    fetch('./results.json')
      .then(r => r.json())
      .then(d => {
        document.getElementById('fps').textContent = d.fps.toFixed(1);
        document.getElementById('timestamp').textContent = new Date(d.timestamp).toLocaleString();
      })
      .catch(() => {
        document.getElementById('fps').textContent = 'No results';
        document.getElementById('timestamp').textContent = 'Run benchmarks first';
      });
  </script>
</body>
</html>
