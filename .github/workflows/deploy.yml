name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - run: npm run build

      - run: npm run -w playground build

      - run: npm run build:docs

      - name: Copy benchmarks to playground dist
        run: |
          mkdir -p ./playground/dist/benchmarks
          cp ./benchmarks/dashboard.html ./playground/dist/benchmarks/
          cp ./benchmarks/compare.js ./playground/dist/benchmarks/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playground/dist
